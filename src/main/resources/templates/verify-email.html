<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.3/font/bootstrap-icons.css">

    <title>Elite Sports Equipment</title>
</head>
<body class="d-flex flex-column min-vh-100">

<!-- NAVBAR -->
<div th:replace="~{fragments/navbar}">Navbar</div>

<div class="d-flex align-items-center justify-content-center my-5">
    <div class="text-center">
        <h1 class="display-4 fw-bold">Email Verification</h1>
        <div th:if="${message}" class="alert alert-success text-center fs-4">
            <p th:text="${message}">Email sent message</p>
        </div>
        <p class="fs-4">If a verification email doesn't send in a few minutes, click the button below to re-send verification</p>

        <form th:action="@{/users/resend-verification}" method="post" class="d-inline">
            <input type="hidden" name="email" th:value="${email}">
            <button type="submit" class="btn btn-danger">Resend Verification</button>
        </form>
        <a href="javascript:history.back()" class="btn btn-secondary">Go Back</a>
    </div>
</div>

<!-- FOOTER -->
<div th:replace="~{fragments/footer}">Footer</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>

</body>
</html>
