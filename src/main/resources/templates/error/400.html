<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.3/font/bootstrap-icons.css">

    <title>Elite Sports Equipment</title>
</head>
<body class="d-flex flex-column min-vh-100">

<!-- NAVBAR -->
<div th:replace="~{fragments/navbar}">Navbar</div>

<div class="d-flex align-items-center justify-content-center my-5">
    <div class="text-center">
        <h1 class="display-1 fw-bold" th:text="${status}">400</h1>
        <p class="fs-3"> <span class="text-danger">Oops!</span> Bad request.</p>
        <p class="lead" th:text="${errorMessage}">
            Just a baad baaaad request.
        </p>
        <div class="error-details">
            <strong>Error Details:</strong>
            <div>Status: <span th:text="${status}">400</span></div>
            <div>Path: <span th:text="${path}">Unknown</span></div>
            <div>Time: <span th:text="${#temporals.format(timestamp, 'dd/MM/yyyy HH:mm:ss')}">Unknown</span></div>
        </div>
        <a th:href="@{/}" class="btn btn-danger">GO HOME</a>
        <a href="javascript:history.back()" class="btn btn-secondary">GO BACK</a>
    </div>
</div>

<!-- FOOTER -->
<div th:replace="~{fragments/footer}">Footer</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>

</body>
</html>
