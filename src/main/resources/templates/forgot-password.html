<!doctype html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" type="text/css" href="/css/main.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.3/font/bootstrap-icons.css">

    <title>Elite Sports Equipment</title>
</head>
<body class="d-flex flex-column min-vh-100">

<!-- NAVBAR -->
<div th:replace="~{fragments/navbar}">Navbar</div>

<div class="container-lg">

    <div class="text-center pt-5">
        <h2>PASSWORD RESET</h2>
    </div>
    <div class="row justify-content-center my-5">
        <div class="col-lg-6">
            <div th:if="${message}" class="alert alert-success text-center fs-4">
                <p th:text="${message}">Email sent message</p>
            </div>
            <form
                    th:action="@{/users/forgot-password}"
                    th:method="POST"
                    th:object="${emailForPasswordResetDto}">
                <label for="email" class="form-label">Enter your email adress, and we'll send you a link to reset password:</label>
                <div class="input-group mb-4">
                    <span class="input-group-text">
                        <i class="bi bi-envelope-fill"></i>
                    </span>
                    <input type="text"
                           id="email"
                           th:field="*{email}"
                           th:errorclass="is-invalid"
                           name="email"
                           min="2"
                           max="50"
                           class="form-control"
                           placeholder="Email address..."/>
                </div>
                <p th:if="${#fields.hasErrors('email')}"
                   th:errors="*{email}" class="errors alert alert-danger">
                    Invalid email.
                </p>
                <div class="mb-4 mt-3 text-center">
                    <button type="submit" class="btn btn-danger btn-lg">RESET PASSWORD</button>
                    <a href="javascript:history.back()" class="btn btn-secondary">GO BACK</a>
                </div>
            </form>

        </div>
    </div>
</div>

<!-- FOOTER -->
<div th:replace="~{fragments/footer}">Footer</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>

</body>
</html>
