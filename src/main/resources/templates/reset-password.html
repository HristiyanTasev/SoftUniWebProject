<!doctype html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" type="text/css" href="/css/main.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.3/font/bootstrap-icons.css">

    <title>Elite Sports Equipment</title>
</head>
<body class="d-flex flex-column min-vh-100">

<!-- NAVBAR -->
<div th:replace="~{fragments/navbar}">Navbar</div>

<div class="container-lg">

    <div class="text-center pt-5">
        <h2 th:text="#{login_header}">PASSWORD RESET</h2>
    </div>
    <div class="row justify-content-center my-5">
        <div class="col-lg-6">

            <form
                    th:action="@{/users/reset-password}"
                    th:method="POST"
                    th:object="${passwordResetDTO}">
                <label for="password" class="form-label">New Password:</label>
                <div class="mb-4 input-group">
                    <span class="input-group-text">
                        <i class="bi bi-key"></i>
                    </span>
                    <input type="password"
                           id="password"
                           name="password"
                           th:field="*{password}"
                           th:errorclass="is-invalid"
                           class="form-control"
                           placeholder="New Password..."/>
                    <p class="invalid-feedback errors alert alert-danger">
                        Password is required and should be at least 5 symbols.
                    </p>
                </div>

                <label for="confirmPassword" class="form-label">Confirm Password:</label>
                <div class="mb-4 input-group">
                    <span class="input-group-text">
                        <i class="bi bi-key"></i>
                    </span>
                    <input type="password"
                           id="confirmPassword"
                           name="confirmPassword"
                           th:field="*{confirmPassword}"
                           th:errorclass="is-invalid"
                           class="form-control"
                           placeholder="Confirm password..."/>
                    <p class="invalid-feedback errors alert alert-danger">
                        Passwords should match.
                    </p>
                </div>
                <div class="mb-4 mt-3 text-center">
                    <input type="hidden" name="token" th:value="${token}">
                    <button type="submit" class="btn btn-danger btn-lg">CHANGE PASSWORD</button>
                    <a href="javascript:history.back()" class="btn btn-secondary">GO BACK</a>
                </div>
            </form>

        </div>
    </div>
</div>

<!-- FOOTER -->
<div th:replace="~{fragments/footer}">Footer</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>

</body>
</html>
